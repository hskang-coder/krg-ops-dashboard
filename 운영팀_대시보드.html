<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRG 개런티즈 운영팀</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:   #2563A8;
  --purple: #7C3AED;
  --green:  #059669;
  --bg:     #EDF2F9;
  --card:   #FFFFFF;
  --border: #E2EAF5;
  --text:   #1E2A3A;
  --muted:  #8A9AB5;
}
body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

/* ─── HEADER ─────────────────────────────── */
.header { background: #1A3A5C; }
.header-inner { padding: 0 24px; }
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0 10px; flex-wrap: wrap; gap: 8px;
}
.brand { color: #7BAED4; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
.dash-title { color: #FFF; font-size: 18px; font-weight: 800; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.date-badge { background: rgba(255,255,255,0.12); color: #AACDE8; font-size: 12px; padding: 5px 12px; border-radius: 20px; white-space: nowrap; }
.refresh-btn {
  background: rgba(255,255,255,0.12); border: none; cursor: pointer;
  color: #AACDE8; font-size: 12px; padding: 5px 12px; border-radius: 20px; transition: all 0.2s;
}
.refresh-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #34D399; display: inline-block; margin-right: 4px; vertical-align: middle; }
.status-dot.loading { background: #FCD34D; animation: blink 1s infinite; }
.status-dot.error   { background: #F87171; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ─── VIEW TABS ─────────────────────────────── */
.view-tabs {
  display: flex; padding: 0 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  background: rgba(0,0,0,0.12);
}
.view-tab {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 700;
  padding: 10px 20px; border-bottom: 3px solid transparent; transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.view-tab.active { color: #FFF; border-bottom-color: #4DA3E8; }
.view-tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

/* ─── PERSON TABS (체크리스트 전용) ─────────────────────────────── */
.person-tabs-row {
  display: flex; gap: 4px; padding: 10px 24px 0;
}
.person-tab {
  background: rgba(255,255,255,0.08); border: none; cursor: pointer;
  color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 700;
  padding: 7px 20px; border-radius: 8px 8px 0 0; transition: all 0.18s;
}
.person-tab.active        { background: var(--bg); color: var(--blue); }
.person-tab:not(.active):hover { background: rgba(255,255,255,0.15); color: #fff; }

/* ─── PERIOD TABS ─────────────────────────────── */
.period-tabs { display: flex; padding: 0 24px; }
.period-tab {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 700;
  padding: 10px 22px; border-bottom: 3px solid transparent; transition: all 0.2s;
}
.period-tab.active { color: #FFF; border-bottom-color: #4DA3E8; }
.period-tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

/* ─── PIE + ANALYSIS SPLIT ─────────────────────────────── */
.pie-analysis-split { display: flex; align-items: stretch; }
.pie-split-left { flex: 1; min-width: 0; border-right: 1.5px solid var(--border); }
.pie-split-right {
  width: 280px; flex-shrink: 0;
  display: flex; flex-direction: column; overflow-y: auto;
  background: #F4F7FD;
}
@media(max-width:900px){
  .pie-analysis-split { flex-direction: column; }
  .pie-split-left { border-right: none; border-bottom: 1.5px solid var(--border); }
  .pie-split-right { width: auto; }
}

/* 헤더 */
.analysis-col-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 13px; background: #fff;
  border-bottom: 2px solid #E8EFF8;
}
.analysis-col-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.analysis-col-name  { font-size: 14px; font-weight: 800; color: #1A3A5C; flex: 1; }
.analysis-col-stats { font-size: 11px; color: #7A8CAA; text-align: right; line-height: 1.6; font-weight: 600; }

/* 섹션 공통 */
.analysis-section {
  padding: 13px 16px; background: #fff;
  border-bottom: 1px solid #E8EFF8;
}
.analysis-section-title {
  font-size: 10px; font-weight: 700; color: #9AAAC4;
  letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 10px;
}
.analysis-empty { color: #C8D5E8; font-size: 12px; text-align: center; padding: 20px 0; }

/* TOP3 */
.top3-item { margin-bottom: 12px; }
.top3-item:last-child { margin-bottom: 0; }
.top3-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.top3-left { display: flex; align-items: center; gap: 5px; }
.top3-rank { font-size: 15px; line-height: 1; }
.top3-cat  { font-size: 12px; font-weight: 700; color: #1E2A3A; }
.top3-pill {
  font-size: 10px; font-weight: 700; color: #5066A8;
  background: #EEF2FF; border-radius: 20px; padding: 2px 7px;
}
.top3-bar-bg   { background: #EDF2FF; border-radius: 999px; height: 5px; overflow: hidden; }
.top3-bar-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }
.top3-examples { font-size: 10px; color: #A0ADBE; margin-top: 4px; line-height: 1.5; padding-left: 2px; }

/* TELL vs 업무 */
.ratio-nums { display: flex; gap: 8px; margin-bottom: 8px; }
.ratio-num-card {
  flex: 1; background: #F4F7FD; border-radius: 8px;
  padding: 8px 10px; text-align: center;
}
.ratio-num-val { font-size: 18px; font-weight: 800; line-height: 1; }
.ratio-num-lbl { font-size: 9px; color: #9AAAC4; margin-top: 3px; font-weight: 600; letter-spacing: 0.3px; }
.ratio-bar-wrap { background: #E8EFF8; border-radius: 999px; height: 8px; overflow: hidden; display: flex; }
.ratio-tell { background: linear-gradient(90deg,#A78BFA,#7C3AED); height: 100%; }
.ratio-work { background: linear-gradient(90deg,#60A5FA,#2563A8); height: 100%; }
.ratio-footer { display: flex; justify-content: space-between; margin-top: 5px; font-size: 10px; color: #A0ADBE; }

/* 개선 제안 카드 */
.suggest-cards { display: flex; flex-direction: column; gap: 7px; }
.suggest-card {
  background: #F8FAFF; border-radius: 8px; padding: 9px 11px;
  border-left: 3px solid #7C3AED;
}
.suggest-card-warn { border-left-color: #E53E3E; background: #FFF5F5; }
.suggest-card-tag  {
  font-size: 10px; font-weight: 700; color: #5A5FA8;
  margin-bottom: 3px; display: block;
}
.suggest-card-warn .suggest-card-tag { color: #C53030; }
.suggest-card-body { font-size: 11px; color: #3A4A6A; line-height: 1.55; }
.suggest-card-body b { color: #1A2A4A; }

/* ─── DATE NAV ─────────────────────────────── */
.date-nav-row {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 24px; background: rgba(0,0,0,0.10);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.date-nav-btn {
  background: rgba(255,255,255,0.10); border: none; cursor: pointer;
  color: #AACDE8; font-size: 13px; font-weight: 700;
  width: 28px; height: 28px; border-radius: 6px; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center;
}
.date-nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); color: #fff; }
.date-nav-btn:disabled { opacity: 0.3; cursor: default; }
.date-nav-label {
  color: #FFF; font-size: 13px; font-weight: 700;
  min-width: 160px; text-align: center;
}
.date-nav-today {
  background: rgba(77,163,232,0.25); border: 1px solid rgba(77,163,232,0.5);
  border-radius: 12px; cursor: pointer; color: #7EC8F0;
  font-size: 11px; font-weight: 700; padding: 3px 10px; transition: all 0.18s;
}
.date-nav-today:hover { background: rgba(77,163,232,0.45); color: #fff; }

/* ─── CONTENT ─────────────────────────────── */
.view-content { display: none; }
.view-content.active { display: block; }

/* ─── DASHBOARD LAYOUT ─────────────────────────────── */
.dash-inner { max-width: 1400px; margin: 0 auto; padding: 20px 16px 40px; }

.kpi-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 16px; }
@media(max-width:1100px){ .kpi-row{ grid-template-columns: repeat(3,1fr); } }
@media(max-width:700px) { .kpi-row{ grid-template-columns: repeat(2,1fr); } }

.kpi-card { background: #FFF; border-radius: 12px; padding: 16px 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1.5px solid var(--border); }
.kpi-label { font-size: 11px; font-weight: 600; color: #8A9AB5; letter-spacing: 0.5px; margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
.kpi-sub   { font-size: 11px; color: #A0ADBE; }
.kpi-0 .kpi-value { color: var(--blue); }
.kpi-1 .kpi-value { color: var(--purple); }
.kpi-2 .kpi-value { color: var(--green); }
.kpi-3 .kpi-value { color: #D97706; }
.kpi-4 .kpi-value { color: #DC2626; }

.main-grid { display: grid; grid-template-columns: 340px 1fr; gap: 14px; margin-bottom: 14px; }
@media(max-width:900px){ .main-grid{ grid-template-columns: 1fr; } }

.card { background: #FFF; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1.5px solid var(--border); padding: 18px 20px; }
.card-title { font-size: 13px; font-weight: 700; color: #1A3A5C; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-blue   { background: var(--blue); }
.dot-purple { background: var(--purple); }
.dot-green  { background: var(--green); }

.bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:900px){ .bottom-grid{ grid-template-columns: 1fr; } }

.chart-wrap { position: relative; }
.chart-canvas    { max-height: 240px; }
.chart-canvas-sm { max-height: 200px; }

.chart-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.legend-item  { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #5A6A8A; }
.legend-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* 담당자 진척 */
.person-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.person-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #FFF; flex-shrink: 0; }
.av-blue   { background: var(--blue); }
.av-purple { background: var(--purple); }
.av-green  { background: var(--green); }
.person-info { flex: 1; }
.person-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.person-name { font-size: 13px; font-weight: 700; color: #1E2A3A; }
.pbar-bg   { background: #EEF2FA; border-radius: 6px; height: 7px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
.fill-blue   { background: linear-gradient(90deg, var(--blue),   #4DA3E8); }
.fill-purple { background: linear-gradient(90deg, var(--purple), #A78BFA); }
.fill-green  { background: linear-gradient(90deg, var(--green),  #34D399); }

.data-status { background: #F0F7FF; border: 1px solid #BFDBFE; border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #1D4ED8; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.data-status.warn  { background: #FFFBEB; border-color: #FDE68A; color: #92400E; }
.data-status.error { background: #FEF2F2; border-color: #FECACA; color: #991B1B; }

.mini-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.mini-table th { background: #1A3A5C; color: #FFF; padding: 6px 10px; text-align: left; font-size: 11px; font-weight: 600; }
.mini-table td { padding: 6px 10px; border-bottom: 1px solid #EEF2FA; color: #1E2A3A; }
.mini-table tr:last-child td { border-bottom: none; }
.mini-table tr:hover td { background: #F5F8FF; }
.mini-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; }
.cat-계약관리 { background:#DBEAFE; color:#1D4ED8; }
.cat-심사관리 { background:#EDE9FE; color:#6D28D9; }
.cat-정산관리 { background:#D1FAE5; color:#065F46; }
.cat-퇴실관리 { background:#FEF3C7; color:#92400E; }
.cat-연체관리 { background:#FEE2E2; color:#991B1B; }
.cat-갱신관리 { background:#CCFBF1; color:#115E59; }
.cat-상담관리 { background:#FCE7F3; color:#9D174D; }
.cat-기타     { background:#F1F5F9; color:#334155; }

.section-divider { height: 1px; background: #EEF2FA; margin: 14px 0; }
.no-data { text-align: center; color: #C8D5E8; font-size: 13px; padding: 30px 0; }

/* ─── 파이차트 담당자 필터 ─────────────────────────────── */
.pie-filter-row { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
.pie-filter-btn {
  background: #F0F4FA; border: 1.5px solid var(--border); border-radius: 20px;
  cursor: pointer; color: var(--muted); font-size: 11px; font-weight: 700;
  padding: 4px 13px; transition: all 0.18s; line-height: 1.6;
}
.pie-filter-btn:hover { border-color: #B0C4DE; color: var(--blue); }
.pie-filter-btn.active { background: #1A3A5C; border-color: #1A3A5C; color: #FFF; }
.pie-filter-btn.pf-blue   { }
.pie-filter-btn.pf-blue.active   { background: var(--blue);   border-color: var(--blue); }
.pie-filter-btn.pf-purple.active { background: var(--purple); border-color: var(--purple); }
.pie-filter-btn.pf-green.active  { background: var(--green);  border-color: var(--green); }

/* ─── CHECKLIST LAYOUT ─────────────────────────────── */
.ck-inner { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

/* 담당자 컬러 */
.ck-wrap[data-person="고송미"] { --pcolor: var(--blue);   --pgradient: linear-gradient(90deg,#60A5FA,#2563A8); }
.ck-wrap[data-person="이지희"] { --pcolor: var(--purple); --pgradient: linear-gradient(90deg,#A78BFA,#7C3AED); }
.ck-wrap[data-person="강휘수"] { --pcolor: var(--green);  --pgradient: linear-gradient(90deg,#34D399,#059669); }

.ck-period-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.ck-period-btn {
  background: #fff; border: 2px solid var(--border); border-radius: 24px;
  cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 700;
  padding: 7px 20px; transition: all 0.18s;
}
.ck-period-btn.active { border-color: var(--pcolor, var(--blue)); color: var(--pcolor, var(--blue)); background: #EBF3FC; }
.ck-period-btn:not(.active):hover { border-color: #B0C4DE; color: var(--blue); }

.ck-progress-card {
  background: #fff; border-radius: 14px; border: 1.5px solid var(--border);
  padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.ck-prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.ck-prog-label  { font-size: 13px; font-weight: 700; color: var(--muted); }
.ck-prog-pct    { font-size: 22px; font-weight: 900; color: var(--pcolor, var(--blue)); }
.ck-bar-bg      { background: #E8EFF8; border-radius: 999px; height: 10px; overflow: hidden; }
.ck-bar-fill    { height: 100%; border-radius: 999px; transition: width 0.4s ease; background: var(--pgradient, linear-gradient(90deg,#4DA3E8,#2563A8)); }
.ck-bar-fill.complete { background: linear-gradient(90deg,#34D399,#059669); }
.ck-prog-sub    { font-size: 11px; color: var(--muted); margin-top: 6px; }

.ck-list { display: flex; flex-direction: column; gap: 8px; }
.ck-item {
  background: #fff; border-radius: 12px; border: 1.5px solid var(--border);
  padding: 14px 16px; display: flex; align-items: flex-start; gap: 14px;
  cursor: pointer; transition: all 0.18s; user-select: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.ck-item:hover      { border-color: #B0C4DE; box-shadow: 0 2px 8px rgba(37,99,168,0.1); }
.ck-item.done       { background: #F0FDF4; border-color: #A7F3D0; }
.ck-box {
  width: 22px; height: 22px; border-radius: 6px; border: 2px solid #C8D8EC;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.18s; margin-top: 1px; background: #fff;
}
.ck-item.done .ck-box { background: var(--green); border-color: var(--green); }
.ck-box svg { display: none; }
.ck-item.done .ck-box svg { display: block; }
.ck-label-text { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; transition: all 0.18s; }
.ck-item.done .ck-label-text { text-decoration: line-through; color: #6B7280; }
.ck-time-text { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 500; }

/* ─── LOG SUMMARY ─────────────────────────────── */
.log-summary {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  background: #F3F7FF; border: 1px solid #BFDBFE; border-radius: 10px;
  padding: 10px 14px; margin-bottom: 12px; font-size: 12px;
}
.log-sum-item {
  display: flex; align-items: center; gap: 5px;
  background: #fff; border-radius: 6px; padding: 4px 10px;
  border: 1px solid #E2EAF5; font-weight: 600;
}
.log-sum-label { color: #8A9AB5; font-weight: 500; }
.log-sum-val   { color: #1A3A5C; }
.log-sum-divider { color: #CBD5E1; }
.log-comment {
  flex: 1; min-width: 200px; color: #4B5D78; font-size: 11.5px;
  line-height: 1.6; padding: 4px 10px; background: #EBF3FF;
  border-radius: 6px; border: 1px solid #BFDBFE;
}
.log-analysis-wrap { display: flex; flex-direction: column; gap: 8px; }
.log-insight-row {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  background: #F8F3FF; border: 1px solid #DDD6FE; border-radius: 8px;
  padding: 8px 12px; font-size: 12px;
}
.log-insight-label { color: #6D28D9; font-weight: 700; margin-right: 4px; }
.log-insight-chip {
  background: #EDE9FE; color: #4C1D95; border-radius: 6px;
  padding: 3px 10px; font-size: 11px; font-weight: 600;
}
.log-suggest-block {
  background: #F0FDF4; border: 1px solid #A7F3D0; border-radius: 8px;
  padding: 10px 14px; display: flex; flex-direction: column; gap: 6px;
}
.log-suggest-title { font-size: 12px; font-weight: 700; color: #065F46; margin-bottom: 2px; }
.log-suggest-item {
  font-size: 11.5px; color: #1F4E3A; line-height: 1.6;
  display: flex; align-items: flex-start; gap: 4px;
}
.log-suggest-item::before { content: "▸"; color: #059669; flex-shrink: 0; margin-top: 1px; }
.log-suggest-tell { color: #1D4ED8; background: #EFF6FF; border-radius: 5px; padding: 3px 8px; }
.log-suggest-tell::before { content: ""; }

.ck-empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.ck-empty-icon { font-size: 40px; margin-bottom: 12px; }
.ck-empty-text { font-size: 14px; }

.ck-reset-row { display: flex; justify-content: flex-end; margin-top: 12px; }
.ck-reset-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 12px; padding: 6px 14px; cursor: pointer; transition: all 0.18s;
}
.ck-reset-btn:hover { border-color: #F87171; color: #DC2626; background: #FFF5F5; }

/* ─── TOAST ─────────────────────────────── */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #1A3A5C; color: #FFF; padding: 10px 20px;
  border-radius: 20px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; }

@media(max-width:600px){
  .person-tab   { padding: 7px 14px; font-size: 12px; }
  .period-tab   { padding: 9px 14px; font-size: 12px; }
  .ck-period-btn { padding: 6px 14px; font-size: 12px; }
}
</style>
</head>

// ═══════════════════════════════════════════
// ■ DATE HELPERS
// ═══════════════════════════════════════════
function pad(n) { return String(n).padStart(2,'0'); }
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }

// offset 적용된 기준 날짜 계산
function getOffsetDay() {
  const d = today();
  d.setDate(d.getDate() + periodOffset);
  return d;
}
function getWeekStart() {
  const d = today();
  d.setDate(d.getDate() - (d.getDay()||7) + 1 + periodOffset * 7);
  return d;
}
function getMonthStart() {
  const d = today();
  d.setDate(1);
  d.setMonth(d.getMonth() + periodOffset);
  return d;
}

function parseKoreanDate(str) {
  if (!str) return null;
  const s = String(str).trim();

  // ISO 날짜-시간 문자열 처리 (Apps Script getValues() 반환값)
  // 예: "2026-04-19T15:00:00.000Z" → UTC+9에서 로컬 날짜 2026-04-20
  if (/^\d{4}-\d{2}-\d{2}T/.test(s)) {
    const d = new Date(s);
    if (isNaN(d) || d.getFullYear() < 2020) return null;
    // getFullYear/Month/Date는 로컬 시간 기준이므로 한국시간에 맞게 정확히 변환됨
    return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  }

  // 한국식 날짜 "2026. 4. 20." 또는 "2026-04-20" 등
  const m = s.match(/(\d{4})[.\-\s]+(\d{1,2})[.\-\s]+(\d{1,2})/);
  if (!m) return null;
  const d = new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  if (d.getFullYear() < 2020) return null;
  return d;
}

function filterByPeriod(data) {
  return data.filter(r => {
    const d = parseKoreanDate(r.date);
    if (!d) return false;
    if (currentPeriod === 'daily') {
      return d.getTime() === getOffsetDay().getTime();
    }
    if (currentPeriod === 'weekly') {
      const ws = getWeekStart();
      const we = new Date(ws); we.setDate(ws.getDate() + 6);
      return d >= ws && d <= we;
    }
    // monthly
    const ms = getMonthStart();
    return d.getFullYear() === ms.getFullYear() && d.getMonth() === ms.getMonth();
  });
}

function getPeriodKey(period) {
  const d = new Date();
  if (period === 'daily')  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if (period === 'weekly') {
    const jan1 = new Date(d.getFullYear(),0,1);
    const w = Math.ceil((((d-jan1)/86400000)+jan1.getDay()+1)/7);
    return `${d.getFullYear()}-W${pad(w)}`;
  }
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function storageKey(person, period) {
  return `ck_${person}_${period}_${getPeriodKey(period)}`;
}
function ckLoad(person, period) {
  try { return JSON.parse(localStorage.getItem(storageKey(person,period))||'{}'); } catch { return {}; }
}
function ckSave(person, period, state) {
  try { localStorage.setItem(storageKey(person,period), JSON.stringify(state)); } catch {}
}

function updateDateBadge() {
  const days = ['일','월','화','수','목','금','토'];
  let text = '';
  if (currentPeriod === 'daily') {
    const d = getOffsetDay();
    text = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  } else if (currentPeriod === 'weekly') {
    const mon = getWeekStart();
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    text = `${mon.getMonth()+1}/${mon.getDate()} ~ ${sun.getMonth()+1}/${sun.getDate()}`;
  } else {
    const ms = getMonthStart();
    text = `${ms.getFullYear()}년 ${ms.getMonth()+1}월`;
  }
  document.getElementById('dateBadge').textContent = text;
  // 날짜 네비 라벨 업데이트
  const navLabel = document.getElementById('dateNavLabel');
  if (navLabel) navLabel.textContent = text;
  // 미래 이동 버튼 비활성화
  const fwdBtn = document.getElementById('dateNavFwd');
  if (fwdBtn) fwdBtn.disabled = periodOffset >= 0;
}

function shiftPeriod(delta) {
  if (delta === 0) { periodOffset = 0; }
  else { periodOffset += delta; }
  updateDateBadge();
  if (currentView === 'dashboard') {
    renderCkProgress();
    if (allData.length > 0) renderDashboard(); else renderEmpty();
  } else {
    renderCkFull();
  }
}

// ═══════════════════════════════════════════
// ■ DASHBOARD — 체크리스트 진척 (KPI 영역)

function getCkProgress(personKey, period) {
  const total = CK_COUNTS[personKey]?.[period] ?? 0;
  if (total === 0) return { pct:0, done:0, total:0, noTask:true };
  const key = `${personKey}_${period}_${getPeriodKey(period)}`;
  let state = {};
  try { state = JSON.parse(localStorage.getItem(`ck_${key}`) || '{}'); } catch {}
  const done = Object.values(state).filter(Boolean).length;
  return { pct: Math.round(done/total*100), done, total, noTask:false };
}

function renderCkProgress() {
  const section  = document.getElementById('checklistProgressSection');
  const avColors = ['#2563A8','#7C3AED','#059669'];

              <span style="font-size:12px;color:#A0ADBE">N/A</span>
            </div>

          </div>
        </div>`;
      return;
    }
    const state = ckLoad(p.key, currentPeriod);
    const done  = tasks.filter(t => state[t.id]).length;
    const pct   = Math.round(done/total*100);
    totalPct += pct; countWithTask++;
    html += `
      <div class="person-row">
        <div class="person-avatar ${p.avClass}">${p.name[0]}</div>
        <div class="person-info">
          <div class="person-name-row">
            <span class="person-name">${p.name}</span>
            <span style="font-size:12px;font-weight:700;color:${avColors[i]}">${pct}%</span>
          </div>
          <div class="pbar-bg">
            <div class="pbar-fill ${p.fillClass}" style="width:${pct}%"></div>
          </div>
          <div style="font-size:10px;color:#A0ADBE;margin-top:3px">${done}/${total} 완료</div>
        </div>
      </div>`;
  });

  const avgPct = countWithTask ? Math.round(totalPct/countWithTask) : 0;
  document.getElementById('kpi-check').textContent = avgPct + '%';

  section.innerHTML = html;
}

        </div>

function ckToggle(taskId) {
  const state = ckLoad(currentPerson, currentPeriod);

}

function ckReset() {
  const labels = { daily:'데일리', weekly:'위클리', monthly:'먼슬리' };
  if (!confirm(`${currentPerson}의 ${labels[currentPeriod]} 체크리스트를 초기화할까요?`)) return;
  localStorage.removeItem(storageKey(currentPerson, currentPeriod));
  renderCkFull();
  renderCkProgress();
}

// ■ GOOGLE SHEETS — JSONP
// ═══════════════════════════════════════════
function fetchSheetJSONP(gid) {
  return new Promise((resolve, reject) => {
    const cbName = '_gsCb' + Date.now();
    const params = new URLSearchParams({ gid, range:'A7:Q', headers:'1', tqx:'out:json', callback:cbName });
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?${params}`;
    let timer = null;
    window[cbName] = function(resp) {
      clearTimeout(timer); delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(resp);
    };
    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => {
      clearTimeout(timer); delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('스크립트 로드 실패'));
    };
    document.head.appendChild(script);
    timer = setTimeout(() => {
      if (window[cbName]) {
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
        reject(new Error('요청 시간 초과'));
      }
    }, 10000);
  });
}

function parseGVizTable(resp) {
  if (!resp || !resp.table) return [];
  const { cols, rows } = resp.table;
  const labels = cols.map(c => (c.label||c.id||'').trim());
  const find = (...names) => {
    for (const n of names) {
      const i = labels.findIndex(l => l.includes(n));
      if (i !== -1) return i;
    }
    return -1;
  };
  const dateIdx    = find('일자');
  const typeIdx    = find('구분');
  const personIdx  = find('담당자');
  const tellIdx    = find('TELL대응','Tell대응','TELL');
  const workIdx    = find('업무대응');
  const targetIdx  = find('대상구분');
  const catIdx     = find('업무구분');
  const subIdx     = find('하위구분');
  const contentIdx = find('업무내용');
  const result = [];
  (rows||[]).forEach(row => {
    const c = row.c || [];
    const cell = idx => { if (idx<0||!c[idx]) return ''; return String(c[idx].f??c[idx].v??'').trim(); };
    const num  = idx => parseFloat(cell(idx).replace(/[^0-9.]/g,''))||0;
    const dateStr = cell(dateIdx), person = cell(personIdx);
    if (!dateStr||!person||person==='null') return;
    const d = parseKoreanDate(dateStr);
    if (!d) return;
    result.push({ date:dateStr, dateObj:d, person, type:cell(typeIdx),
      tell:num(tellIdx), work:num(workIdx), target:cell(targetIdx),
      cat:cell(catIdx)||'기타', sub:cell(subIdx), content:cell(contentIdx) });
  });
  return result;
}

// ■ APPS SCRIPT PROXY
// ═══════════════════════════════════════════
async function fetchViaProxy() {
  const res = await fetch(APPS_SCRIPT_URL + '?action=getDaeung', { mode:'cors' });
  if (!res.ok) throw new Error(`Proxy HTTP ${res.status}`);
  const json = await res.json();
  if (!json.data) throw new Error('프록시 데이터 없음');
  return json.data;
}

// ■ LOAD DATA
// ═══════════════════════════════════════════
async function loadData() {
  setStatus('loading','데이터 로딩 중');
  // 1) JSONP
  try {
    const resp = await fetchSheetJSONP(DAEUNG_GID);
    allData = parseGVizTable(resp);
    if (allData.length > 0) {
      setStatus('ok', `${allData.length}건 로드 완료`);
      setDataStatus('ok', `✅ Google Sheets 연결됨 — 총 ${allData.length}건`);
      renderCkProgress(); renderDashboard(); return;
    }
  } catch(e1) { console.warn('JSONP 실패:', e1.message); }
  // 2) Proxy
  try {
    const rows = await fetchViaProxy();
    allData = rows.map(r => {
      const d = parseKoreanDate(String(r['일자']||''));
      return { date:String(r['일자']||''), dateObj:d, person:String(r['담당자']||''),
        type:String(r['구분']||''), tell:parseFloat(String(r['TELL대응']||'0').replace(/[^0-9.]/g,''))||0,
        work:parseFloat(String(r['업무대응']||'0').replace(/[^0-9.]/g,''))||0,
        target:String(r['대상구분']||''), cat:String(r['업무구분']||'기타'),
        sub:String(r['하위구분']||''), content:String(r['업무내용']||'') };
    }).filter(r => r.dateObj);
    if (allData.length > 0) {
      setStatus('ok', `${allData.length}건 로드 완료`);
      setDataStatus('ok', `✅ Apps Script 연결됨 — 총 ${allData.length}건`);
      renderCkProgress(); renderDashboard(); return;
    }
  } catch(e2) { console.warn('Proxy 실패:', e2.message); }
  // 3) 실패
  setStatus('error','연결 실패');
  allData = [];
  setDataStatus('error',
    `❌ 연결 실패 — ① 시트를 <b>"링크가 있는 모든 사용자 — 뷰어"</b>로 공개 설정<br>
     ② Apps Script doGet에 <code>action=getDaeung</code> 핸들러 추가 후 재배포`);
  renderCkProgress(); renderEmpty();
}

function detectContentTheme(content) {
  const text = (content||'').toLowerCase();
  for (const t of CONTENT_THEMES.slice(0, -1)) {
    if (t.kw.some(k => text.includes(k))) return t.theme;
  }
  return '기타 업무';
}

function buildAnalysisCol(rows, label, avClass) {
  const medals    = ['🥇','🥈','🥉'];
  const barColors = ['#7C3AED','#2563A8','#059669'];

  if (!rows.length) {
    return `
      <div class="analysis-col-header">
        <div class="analysis-col-avatar ${avClass}">${label === '전체' ? '전' : label[0]}</div>
        <div class="analysis-col-name">${label}</div>
      </div>
      <div class="analysis-section">
        <div class="analysis-empty">해당 기간 데이터 없음</div>
      </div>`;
  }

  // ── 업무내용 기반 테마별 시간·건수·예시 집계 ──
  const themeMap = {};
  rows.forEach(r => {
    const th = detectContentTheme(r.content);
    if (!themeMap[th]) themeMap[th] = { min: 0, cnt: 0, examples: [] };
    themeMap[th].min += r.tell + r.work;
    themeMap[th].cnt++;
    if (r.content && themeMap[th].examples.length < 2)
      themeMap[th].examples.push(r.content.slice(0,30) + (r.content.length>30?'…':''));
  });

  const sorted    = Object.entries(themeMap).sort((a,b)=>b[1].min-a[1].min);
  const top3      = sorted.slice(0,3);
  const totalMin  = rows.reduce((s,r)=>s+r.tell+r.work, 0);
  const totalTell = rows.reduce((s,r)=>s+r.tell, 0);
  const totalWork = rows.reduce((s,r)=>s+r.work, 0);
  const tellPct   = totalMin > 0 ? Math.round(totalTell/totalMin*100) : 0;
  const workPct   = 100 - tellPct;
  const inCnt     = rows.filter(r=>r.type==='수신').length;
  const outCnt    = rows.filter(r=>r.type==='발신').length;

  const top3Html = top3.map(([theme, v], i) => {
    const pct  = totalMin > 0 ? Math.round(v.min/totalMin*100) : 0;
    const info = CONTENT_THEMES.find(t=>t.theme===theme);
    const icon = info ? info.icon : '📌';
    return `
      <div class="top3-item">
        <div class="top3-header-row">
          <div class="top3-left">
            <span class="top3-rank">${medals[i]}</span>
            <span class="top3-cat">${icon} ${theme}</span>
          </div>
          <span class="top3-pill">${pct}% · ${v.cnt}건</span>
        </div>
        <div class="top3-bar-bg">
          <div class="top3-bar-fill" style="width:${pct}%;background:${barColors[i]}"></div>
        </div>
        ${v.examples.length ? `<div class="top3-examples">${v.examples.map(e=>`"${e}"`).join('<br>')}</div>` : ''}
      </div>`;
  }).join('');

  // ── 개선 제안: 실제 데이터 기반 동적 생성 ──────────────────────────────
  const suggestions = [];

  top3.forEach(([theme, v]) => {
    const info   = CONTENT_THEMES.find(t => t.theme === theme);
    if (!info) return;
    const avgMin = v.cnt > 0 ? Math.round(v.min / v.cnt) : 0;
    const pct    = totalMin > 0 ? Math.round(v.min / totalMin * 100) : 0;
    const saving = Math.round(v.min * (info.savingRate || 0));

    let tag = '', body = '', warn = false;

    if (v.cnt >= 5 && avgMin <= 20) {
      // 고빈도·단시간 → 자동화 최우선 대상
      tag  = `🔄 반복 자동화 추천`;
      body = `${info.icon} <b>${theme}</b> ${v.cnt}건 반복 처리 (평균 ${avgMin}분/건).`
           + ` ${info.tool} 도입 시 월 약 <b>${saving}분</b> 절약 가능합니다.`;
      warn = v.cnt >= 10;
    } else if (avgMin >= 40) {
      // 건당 소요 시간 과다 → SOP 필요
      tag  = `📋 프로세스 표준화 필요`;
      body = `${info.icon} <b>${theme}</b> 평균 처리 ${avgMin}분 (${v.cnt}건). `
           + `${info.action}.`;
    } else if (pct >= 35) {
      // 전체 비중 과다
      warn = pct >= 50;
      tag  = warn ? `⚠️ 업무 집중 과다` : `💡 비중 높음 (${pct}%)`;
      body = `${info.icon} <b>${theme}</b>이 전체 시간의 ${pct}%를 차지합니다. `
           + (info.tool ? `${info.tool}으로 ` : '') + `${info.action}.`;
    } else {
      tag  = `💡 개선 아이디어`;
      body = `${info.icon} <b>${theme}</b> ${v.cnt}건·${v.min}분: ${info.action}.`;
    }

    suggestions.push({ warn, tag, body });
  });

  // 수신 과다 패턴
  if (inCnt > outCnt * 1.5 && inCnt >= 3)
    suggestions.push({
      warn: true, tag: `📞 수신 과다`,
      body: `수신 <b>${inCnt}건</b> vs 발신 ${outCnt}건 — 임차인이 먼저 연락하는 패턴입니다. 카카오 알림톡 선제 안내로 수신 문의를 줄일 수 있습니다.`
    });

  // 통화 비중 과다
  if (tellPct >= 60 && totalMin >= 30)
    suggestions.push({
      warn: false, tag: `⏱️ 통화 비중 ${tellPct}%`,
      body: `TELL 시간이 업무 시간의 <b>${tellPct}%</b>입니다. 반복 문의를 문자·앱 안내로 전환하면 통화 부담을 줄일 수 있습니다.`
    });

  const suggestHtml = suggestions.slice(0, 4).map(s =>
    `<div class="suggest-card${s.warn ? ' suggest-card-warn' : ''}">
       <span class="suggest-card-tag">${s.tag}</span>
       <div class="suggest-card-body">${s.body}</div>
     </div>`
  ).join('') || '<div class="analysis-empty" style="padding:8px 0">분석할 업무내용이 부족합니다</div>';

  return `
    <div class="analysis-col-header">
      <div class="analysis-col-avatar ${avClass}">${label === '전체' ? '전' : label[0]}</div>
      <div class="analysis-col-name">${label}</div>
      <div class="analysis-col-stats">${rows.length}건<br>${formatHour(totalMin)}</div>
    </div>
    <div class="analysis-section">
      <div class="analysis-section-title">업무 집중도 TOP 3</div>
      ${top3Html}
    </div>
    <div class="analysis-section">
      <div class="analysis-section-title">TELL vs 업무</div>
      <div class="ratio-nums">
        <div class="ratio-num-card">
          <div class="ratio-num-val" style="color:#7C3AED">${tellPct}%</div>
          <div class="ratio-num-lbl">📞 TELL · ${formatHour(totalTell)}</div>
        </div>
        <div class="ratio-num-card">
          <div class="ratio-num-val" style="color:#2563A8">${workPct}%</div>
          <div class="ratio-num-lbl">💼 업무 · ${formatHour(totalWork)}</div>
        </div>
      </div>
      <div class="ratio-bar-wrap">
        <div class="ratio-tell" style="width:${tellPct}%"></div>
        <div class="ratio-work" style="width:${workPct}%"></div>
      </div>
      <div class="ratio-footer">
        <span>발신 ${outCnt}건</span>
        <span>수신 ${inCnt}건</span>
      </div>
    </div>
    <div class="analysis-section">
      <div class="analysis-section-title">개선 제안</div>
      <div class="suggest-cards">${suggestHtml}</div>
    </div>`;
}

function renderKPI(data) {
  const tellMin  = data.reduce((s,r)=>s+r.tell,0);
  const workMin  = data.reduce((s,r)=>s+r.work,0);
  const outgoing = data.filter(r=>r.type==='발신').length;
  const incoming = data.filter(r=>r.type==='수신').length;
  document.getElementById('kpi-count').textContent = data.length + '건';
  document.getElementById('kpi-count-sub').textContent = `발신 ${outgoing} · 수신 ${incoming}`;
  document.getElementById('kpi-tell').textContent = formatHour(tellMin);
  document.getElementById('kpi-tell-sub').textContent = `${tellMin}분 합계`;
  document.getElementById('kpi-work').textContent = formatHour(workMin);
  document.getElementById('kpi-work-sub').textContent = `${workMin}분 합계`;
  document.getElementById('kpi-call').textContent = outgoing + ' / ' + incoming;
  document.getElementById('kpi-call-sub').textContent = '발신 / 수신 건수';
}
function formatHour(min) {
  if (min===0) return '0h';
  const h = Math.floor(min/60), m = min%60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function renderPieChart(data) {
  destroyChart('pie');

  const source = currentPiePerson === 'all'
    ? data
    : data.filter(r => r.person === currentPiePerson);

  const catMap = {};
  source.forEach(r => { const c = r.cat||'기타'; catMap[c] = (catMap[c]||0)+r.tell+r.work; });
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  const legendEl = document.getElementById('pieLegend');
  if (!sorted.length) {
    legendEl.innerHTML = '<span style="color:#C8D5E8;font-size:12px">해당 기간 데이터 없음</span>';
    return;
  }

  const labels = sorted.map(e=>e[0]), values = sorted.map(e=>e[1]);
  const colors = labels.map(l=>CAT_COLORS[l]||'#94A3B8');
  const total  = values.reduce((s,v)=>s+v,0);

  const centerLabel = currentPiePerson === 'all' ? '전체' : currentPiePerson;
  const centerHours = (total/60).toFixed(1) + 'h';

  const ctx = document.getElementById('catPieChart').getContext('2d');
  charts['pie'] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets:[{ data:values, backgroundColor:colors, borderWidth:2, borderColor:'#FFF' }] },
    options: {
      responsive:true, maintainAspectRatio:true, cutout:'62%',
      plugins: {
        legend: { display:false },
        tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw}분 (${Math.round(c.raw/total*100)}%)` } }
      }
    },
    plugins: [{
      id: 'centerText',
      afterDraw(chart) {
        const { ctx: c, chartArea: { width, height, left, top } } = chart;
        c.save();
        const cx = left + width/2, cy = top + height/2;
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.font = 'bold 13px "Apple SD Gothic Neo",sans-serif';
        c.fillStyle = '#1A3A5C';
        c.fillText(centerLabel, cx, cy - 9);
        c.font = 'bold 15px "Apple SD Gothic Neo",sans-serif';
        c.fillStyle = '#7C3AED';
        c.fillText(centerHours, cx, cy + 10);
        c.restore();
      }
    }]
  });

  legendEl.innerHTML = labels.map((l,i) =>
    `<div class="legend-item">
       <div class="legend-dot" style="background:${colors[i]}"></div>
       ${l}&nbsp;<span style="color:#1A3A5C;font-weight:700">${Math.round(values[i]/total*100)}%</span>
       <span style="color:#B0BDCE;font-size:10px">(${values[i]}분)</span>
     </div>`
  ).join('');
}

function renderTrendChart() {
  destroyChart('trend');
  if (!allData.length) return;
  let labels=[], tellSeries=[], workSeries=[];
  if (currentPeriod === 'daily') {
    for (let i=6; i>=0; i--) {
      const d = new Date(today()); d.setDate(d.getDate()-i);
      const dd = allData.filter(r=>r.dateObj&&r.dateObj.getTime()===d.getTime());
      labels.push(`${d.getMonth()+1}/${d.getDate()}`);
      tellSeries.push(dd.reduce((s,r)=>s+r.tell,0));
      workSeries.push(dd.reduce((s,r)=>s+r.work,0));
    }
  } else if (currentPeriod === 'weekly') {
    const ws = getWeekStart();
    for (let i=7; i>=0; i--) {
      const s = new Date(ws); s.setDate(ws.getDate()-i*7);
      const e = new Date(s); e.setDate(s.getDate()+6);
      const wd = allData.filter(r=>r.dateObj&&r.dateObj>=s&&r.dateObj<=e);
      labels.push(`${s.getMonth()+1}/${s.getDate()}`);
      tellSeries.push(wd.reduce((s2,r)=>s2+r.tell,0));
      workSeries.push(wd.reduce((s2,r)=>s2+r.work,0));
    }
  } else {
    const now = new Date();
    for (let i=5; i>=0; i--) {
      const y=now.getFullYear(), m=now.getMonth()-i;
      const ms=new Date(y,m,1), me=new Date(y,m+1,0);
      const md=allData.filter(r=>r.dateObj&&r.dateObj>=ms&&r.dateObj<=me);
      labels.push(`${ms.getFullYear()}.${ms.getMonth()+1}`);
      tellSeries.push(md.reduce((s,r)=>s+r.tell,0));
      workSeries.push(md.reduce((s,r)=>s+r.work,0));
    }
  }
  const ctx = document.getElementById('trendChart').getContext('2d');
  charts['trend'] = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets:[
      { label:'TELL시간(분)', data:tellSeries, borderColor:'#7C3AED', backgroundColor:'rgba(124,58,237,0.08)', fill:true, tension:0.4, pointRadius:4, borderWidth:2 },
      { label:'업무시간(분)', data:workSeries, borderColor:'#2563A8', backgroundColor:'rgba(37,99,168,0.06)',  fill:true, tension:0.4, pointRadius:4, borderWidth:2 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{grid:{color:'#EEF2FA'},ticks:{font:{size:10}}} },
      plugins:{ legend:{labels:{font:{size:11}}} } }
  });
}

function generateAnalysis(source, totalTell, totalWork, totalMin) {
  const suggestions = [];
  const insights    = [];

  // ── 카테고리별 시간 집계 ──
  const catTime = {}, catCnt = {};
  source.forEach(r => {
    const c = r.cat || '기타';
    catTime[c] = (catTime[c]||0) + r.tell + r.work;
    catCnt[c]  = (catCnt[c]||0) + 1;
  });
  const sortedCat = Object.entries(catTime).sort((a,b)=>b[1]-a[1]);
  const top3Cats  = sortedCat.slice(0,3);

  // ── 인사이트: 상위 업무 시간 비중 ──
  top3Cats.forEach(([cat, min]) => {
    const pct = totalMin > 0 ? Math.round(min/totalMin*100) : 0;
    const cnt = catCnt[cat]||0;
    insights.push(`<b>${cat}</b> ${pct}% (${min}분 / ${cnt}건)`);
    if (CAT_SUGGESTIONS[cat]) {
      CAT_SUGGESTIONS[cat].slice(0,2).forEach(s => suggestions.push({ cat, text: s }));
    }
  });

  // ── 인사이트: TELL 비중 ──
  const tellRatio = totalMin > 0 ? Math.round(totalTell/totalMin*100) : 0;
  let tellInsight = '';
  if (tellRatio >= 60) {
    tellInsight = `전화 대응 비중이 <b>${tellRatio}%</b>로 높습니다. 반복 문의 유형 파악 후 FAQ·자동안내 도입을 검토해 보세요.`;
  } else if (tellRatio <= 20 && totalTell > 0) {
    tellInsight = `업무처리 중심(TELL ${tellRatio}%)으로 내부 프로세스 자동화가 특히 효과적입니다.`;
  }

  // ── 인사이트: 수신 과다 ──
  const inCnt  = source.filter(r=>r.type==='수신').length;
  const outCnt = source.filter(r=>r.type==='발신').length;
  let callInsight = '';
  if (inCnt > outCnt * 1.5 && inCnt >= 3) {
    callInsight = `수신 비중(${inCnt}건)이 발신(${outCnt}건)보다 높습니다. 임차인이 먼저 연락하는 패턴으로, 선제적 안내 강화 시 문의 건수 감소 기대됩니다.`;
  }

  return { insights, suggestions, tellInsight, callInsight };
}

    <tr>
      <td style="text-align:center;color:#A0ADBE;font-size:11px;font-weight:600">${i+1}</td>
      <td>${formatDateObj(r.dateObj)}</td><td>${r.person}</td><td>${r.type||'—'}</td>
      <td><span class="mini-badge cat-${r.cat}">${r.cat}</span></td>
      <td style="color:#4F5E7B">${r.target||'—'}</td>
      <td>${r.tell||'—'}</td><td>${r.work||'—'}</td>
      <td style="color:#4F5E7B">${r.sub||'—'}</td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.content||'—'}</td>
    </tr>`).join('');
}

function renderEmpty() {
  ['kpi-count','kpi-tell','kpi-work','kpi-call'].forEach(id => document.getElementById(id).textContent='—');
  ['kpi-count-sub','kpi-tell-sub','kpi-work-sub','kpi-call-sub'].forEach(id => {
    document.getElementById(id).textContent='Sheets 연결 필요';
  });
  document.getElementById('logTableBody').innerHTML =
    '<tr><td colspan="10" class="no-data">Google Sheets 데이터를 불러올 수 없습니다.<br>시트 공개 여부를 확인하거나 새로고침을 눌러주세요.</td></tr>';
  renderPieChart([]); renderPersonBar([]); renderTrendChart(); renderCallTypeChart([]);
}

// ═══════════════════════════════════════════
// ■ TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════
// ■ INIT
// ═══════════════════════════════════════════
updateDateBadge();
renderCkProgress();
loadData();
// 1분마다 날짜·체크리스트 갱신
setInterval(() => { updateDateBadge(); renderCkProgress(); }, 60000);
// 5분마다 Sheets 데이터 자동 재로드
setInterval(() => { loadData(); }, 5 * 60 * 1000);
</script>
